version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkinwork_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount the database file to persist data between container restarts.
      # Note: If the file doesn't exist on the host, Docker might create a directory instead.
      # Since it exists locally, this will work fine.
      - ./database.sqlite:/app/database.sqlite
    environment:
      - NODE_ENV=development
      - PORT=3000
