<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Daily Work Log - Architect Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "primary": "#0053dc",
                    "primary-container": "#3e76fe",
                    "on-primary": "#faf8ff",
                    "background": "#f7f9fb",
                    "surface": "#f7f9fb",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f0f4f7",
                    "surface-container-high": "#e3e9ed",
                    "on-surface": "#2c3437",
                    "on-surface-variant": "#596064",
                    "outline": "#747c80",
                    "secondary": "#506076",
                    "secondary-fixed": "#d3e4fe",
                    "on-secondary-fixed": "#314055",
                },
                "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
                }
            },
        },
    }
</script>
<style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; letter-spacing: -0.02em; }
    .ambient-shadow { box-shadow: 0 8px 32px rgba(44, 52, 55, 0.06); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col md:flex-row">
<!-- SideNavBar -->
<nav class="hidden md:flex flex-col fixed left-0 top-0 h-full w-64 bg-[#f0f4f7] p-6 gap-y-8 z-50 pt-8">
  <!-- Brand -->
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 flex-shrink-0 bg-primary rounded-lg flex items-center justify-center shadow-md">
      <span class="material-symbols-outlined text-white text-lg">domain</span>
    </div>
    <div>
      <p class="font-headline font-extrabold text-blue-700 leading-tight">Internship Portal</p>
      <p class="text-[10px] text-on-surface-variant uppercase tracking-wider font-semibold">Intern Workspace</p>
    </div>
  </div>

  <!-- Nav Links -->
  <div class="flex flex-col gap-2">
    <a class="text-slate-500 flex items-center gap-3 px-4 py-3 hover:translate-x-1 transition-transform" href="/intern-dashboard.html">
      <span class="material-symbols-outlined text-[20px]">grid_view</span>
      <span class="text-sm font-medium">Dashboard</span>
    </a>
    <a class="text-slate-500 flex items-center gap-3 px-4 py-3 hover:translate-x-1 transition-transform" href="/attendance.html">
      <span class="material-symbols-outlined text-[20px]">event_available</span>
      <span class="text-sm font-medium">Attendance</span>
    </a>
    <a class="text-blue-600 font-bold flex items-center gap-3 px-4 py-3 bg-white rounded-xl shadow-sm transition-transform" href="/daily-log.html">
      <span class="material-symbols-outlined fill text-[20px]" style="font-variation-settings:'FILL' 1">history_edu</span>
      <span class="text-sm">Daily Logs</span>
    </a>
  </div>

  <div class="mt-auto space-y-4">
    <!-- New Log CTA -->
    <a href="/daily-log.html" class="w-full py-3 bg-gradient-to-br from-primary to-primary-container text-white rounded-xl font-semibold shadow-lg shadow-primary/20 flex items-center justify-center gap-2 hover:opacity-95 transition-all">
      <span class="material-symbols-outlined text-sm">add_circle</span>
      New Log Entry
    </a>

    <!-- Logout -->
    <button id="logout-btn" class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 w-full transition-colors font-medium">
      <span class="material-symbols-outlined text-[20px]">logout</span>
      <span class="text-sm">Sign Out</span>
    </button>
  </div>
</nav>
<!-- Main Content -->
<main class="flex-1 md:ml-64 flex flex-col min-h-screen bg-background">
  <!-- Top Header -->
  <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-outline-variant/20 shadow-sm flex items-center justify-between px-8 py-3.5">
    <div class="flex items-center space-x-3">
      <button class="md:hidden p-2 rounded-lg hover:bg-surface-container">
        <span class="material-symbols-outlined text-on-surface-variant">menu</span>
      </button>
      <span class="text-base font-bold text-on-surface font-headline hidden md:block">Daily Logs</span>
    </div>
    <div class="flex items-center space-x-3">
      <div class="text-right">
        <div id="user-name" class="text-sm font-bold text-on-surface">Loading...</div>
        <div id="user-role" class="text-xs text-on-surface-variant capitalize">Intern</div>
      </div>
      <div class="w-9 h-9 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow">
        <span class="material-symbols-outlined text-white text-sm">person</span>
      </div>
    </div>
  </header>
<div class="flex-1 overflow-y-auto p-6 md:p-12">
<div class="max-w-6xl mx-auto">
<div class="mb-10">
<h1 class="text-4xl font-headline font-bold text-on-surface mb-2">Daily Work Log</h1>
<p class="text-on-surface-variant font-body">Record your activities and hours for institutional review.</p>
</div>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
<!-- Form (8 cols) -->
<div class="lg:col-span-8 space-y-8">
<div class="bg-surface-container-lowest rounded-xl p-8 ambient-shadow">
<h2 class="text-2xl font-headline font-bold text-on-surface mb-6">New Entry</h2>
<form id="log-form" class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col space-y-2">
<label class="font-label text-sm text-on-surface-variant" for="log-date">Date</label>
<input class="bg-surface-container-highest border-none rounded-md px-4 py-3 text-on-surface font-body w-full focus:ring-2 focus:ring-primary" id="log-date" name="date" type="date" required/>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label text-sm text-on-surface-variant" for="log-hours">Hours Spent</label>
<input class="bg-surface-container-highest border-none rounded-md px-4 py-3 text-on-surface font-body w-full focus:ring-2 focus:ring-primary" id="log-hours" name="hours_spent" min="0.5" placeholder="e.g. 4.0" step="0.5" type="number" required/>
</div>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label text-sm text-on-surface-variant" for="log-category">Task Category</label>
<select class="bg-surface-container-highest border-none rounded-md px-4 py-3 text-on-surface font-body w-full focus:ring-2 focus:ring-primary appearance-none cursor-pointer" id="log-category" name="task_category" required>
<option disabled="" selected="" value="">Select a category</option>
<option value="Research &amp; Analysis">Research &amp; Analysis</option>
<option value="Drafting &amp; Design">Drafting &amp; Design</option>
<option value="Meetings &amp; Collaboration">Meetings &amp; Collaboration</option>
<option value="Site Visit / Fieldwork">Site Visit / Fieldwork</option>
<option value="Administrative">Administrative</option>
</select>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label text-sm text-on-surface-variant" for="log-description">Description</label>
<textarea class="bg-surface-container-highest border-none rounded-md px-4 py-3 text-on-surface font-body w-full focus:ring-2 focus:ring-primary resize-none" id="log-description" name="description" placeholder="Detail the specific tasks completed, challenges faced, or milestones reached..." rows="4" required></textarea>
</div>
<div id="log-message" class="text-sm font-medium hidden"></div>
<div class="flex justify-end pt-4">
<button class="bg-surface-container-low text-primary font-label px-6 py-2 rounded-md hover:bg-surface-container transition-colors mr-4" type="button" id="btn-save-draft">Save Draft</button>
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-medium px-8 py-3 rounded-lg shadow-md hover:opacity-90 transition-opacity flex items-center space-x-2" type="submit">
<span>Submit for Review</span>
<span class="material-symbols-outlined text-sm">send</span>
</button>
</div>
</form>
</div>
</div>
<!-- Recent Logs (4 cols) -->
<div class="lg:col-span-4">
<div class="bg-surface-container-low rounded-xl p-6 h-full border border-outline/20 border-dashed">
<h3 class="text-lg font-headline font-bold text-on-surface mb-6 flex items-center space-x-2">
<span class="material-symbols-outlined text-secondary">history</span>
<span>Recent Submissions</span>
</h3>
<div class="space-y-4" id="recent-logs-list">
    <!-- Dynamic Logs -->
</div>
</div>
</div>
</div>
</div>
</div>
</main>
<script src="/js/app.js"></script>
</body>
</html>
