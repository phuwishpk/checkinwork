<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Daily Work Log - Architect Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "primary": "#0053dc",
                    "primary-container": "#3e76fe",
                    "on-primary": "#faf8ff",
                    "background": "#f7f9fb",
                    "surface": "#f7f9fb",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f0f4f7",
                    "surface-container-high": "#e3e9ed",
                    "on-surface": "#2c3437",
                    "on-surface-variant": "#596064",
                    "outline": "#747c80",
                    "secondary": "#506076",
                    "secondary-fixed": "#d3e4fe",
                    "on-secondary-fixed": "#314055",
                },
                "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
                }
            },
        },
    }
</script>
<style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; letter-spacing: -0.02em; }
    .ambient-shadow { box-shadow: 0 8px 32px rgba(44, 52, 55, 0.06); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col md:flex-row">
<!-- SideNavBar -->
<nav class="hidden md:flex bg-slate-50 dark:bg-slate-950 text-blue-600 dark:text-blue-400 font-headline docked left-0 h-screen w-64 bg-surface-container-low tonal-contrast flat no-shadows fixed left-0 top-0 flex flex-col h-full p-6 space-y-8 overflow-y-auto z-50">
<div class="flex items-center space-x-3 mb-8">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-on-primary font-bold text-lg">
<span class="material-symbols-outlined">domain</span>
</div>
<div>
<h1 class="text-lg font-bold text-slate-900 dark:text-white leading-tight">Internship System</h1>
<p class="text-xs text-on-surface-variant font-body">Portal</p>
</div>
</div>
<div class="flex-1 mt-6">
<ul class="space-y-2">
<li>
<a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 hover:translate-x-1 transition-all duration-300" href="/intern-dashboard.html">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-body text-sm">Dashboard</span>
</a>
</li>
<li>
<a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 hover:translate-x-1 transition-all duration-300" href="#">
<span class="material-symbols-outlined">event_available</span>
<span class="font-body text-sm">Attendance</span>
</a>
</li>
<li>
<a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-blue-700 dark:text-blue-300 font-semibold bg-blue-50 dark:bg-blue-900/20 active:scale-95 transition-all duration-300" href="/daily-log.html">
<span class="material-symbols-outlined">history_edu</span>
<span class="font-body text-sm">Logs</span>
</a>
</li>
</ul>
</div>
<div class="mt-auto">
<ul class="space-y-2">
<li>
<button id="logout-btn" class="w-full flex items-center space-x-3 px-4 py-2 rounded-lg text-red-600 hover:bg-red-50 transition-colors">
<span class="material-symbols-outlined text-sm">logout</span>
<span class="font-body text-xs">Logout</span>
</button>
</li>
</ul>
</div>
</nav>
<!-- Main Content -->
<main class="flex-1 md:ml-64 flex flex-col min-h-screen">
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md text-blue-600 dark:text-blue-400 docked full-width top-0 sticky z-40 no-border tonal-shift-bg shadow-[0_8px_32px_rgba(44,52,55,0.06)] flex justify-between items-center w-full px-8 py-3 mx-auto">
<div class="flex items-center space-x-4">
<span class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white font-headline">Intern Portal</span>
</div>
<div class="flex items-center space-x-4">
<div class="text-right hidden sm:block">
    <div id="user-name" class="text-sm font-bold text-slate-900 dark:text-white">Loading...</div>
    <div id="user-role" class="text-xs text-slate-500 capitalize">Role</div>
</div>
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-bold">
    <span class="material-symbols-outlined text-sm">person</span>
</div>
</div>
</header>
<div class="flex-1 overflow-y-auto p-6 md:p-12">
<div class="max-w-6xl mx-auto">
<div class="mb-10">
<h1 class="text-4xl font-headline font-bold text-on-surface mb-2">Daily Work Log</h1>
<p class="text-on-surface-variant font-body">Record your activities and hours for institutional review.</p>
</div>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
<!-- Form (8 cols) -->
<div class="lg:col-span-8 space-y-8">
<div class="bg-surface-container-lowest rounded-xl p-8 ambient-shadow">
<h2 class="text-2xl font-headline font-bold text-on-surface mb-6">New Entry</h2>
<form id="log-form" class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col space-y-2">
<label class="font-label text-sm text-on-surface-variant" for="log-date">Date</label>
<input class="bg-surface-container-highest border-none rounded-md px-4 py-3 text-on-surface font-body w-full focus:ring-2 focus:ring-primary" id="log-date" name="date" type="date" required/>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label text-sm text-on-surface-variant" for="log-hours">Hours Spent</label>
<input class="bg-surface-container-highest border-none rounded-md px-4 py-3 text-on-surface font-body w-full focus:ring-2 focus:ring-primary" id="log-hours" name="hours_spent" min="0.5" placeholder="e.g. 4.0" step="0.5" type="number" required/>
</div>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label text-sm text-on-surface-variant" for="log-category">Task Category</label>
<select class="bg-surface-container-highest border-none rounded-md px-4 py-3 text-on-surface font-body w-full focus:ring-2 focus:ring-primary appearance-none cursor-pointer" id="log-category" name="task_category" required>
<option disabled="" selected="" value="">Select a category</option>
<option value="Research &amp; Analysis">Research &amp; Analysis</option>
<option value="Drafting &amp; Design">Drafting &amp; Design</option>
<option value="Meetings &amp; Collaboration">Meetings &amp; Collaboration</option>
<option value="Site Visit / Fieldwork">Site Visit / Fieldwork</option>
<option value="Administrative">Administrative</option>
</select>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label text-sm text-on-surface-variant" for="log-description">Description</label>
<textarea class="bg-surface-container-highest border-none rounded-md px-4 py-3 text-on-surface font-body w-full focus:ring-2 focus:ring-primary resize-none" id="log-description" name="description" placeholder="Detail the specific tasks completed, challenges faced, or milestones reached..." rows="4" required></textarea>
</div>
<div id="log-message" class="text-sm font-medium hidden"></div>
<div class="flex justify-end pt-4">
<button class="bg-surface-container-low text-primary font-label px-6 py-2 rounded-md hover:bg-surface-container transition-colors mr-4" type="button" id="btn-save-draft">Save Draft</button>
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-medium px-8 py-3 rounded-lg shadow-md hover:opacity-90 transition-opacity flex items-center space-x-2" type="submit">
<span>Submit for Review</span>
<span class="material-symbols-outlined text-sm">send</span>
</button>
</div>
</form>
</div>
</div>
<!-- Recent Logs (4 cols) -->
<div class="lg:col-span-4">
<div class="bg-surface-container-low rounded-xl p-6 h-full border border-outline/20 border-dashed">
<h3 class="text-lg font-headline font-bold text-on-surface mb-6 flex items-center space-x-2">
<span class="material-symbols-outlined text-secondary">history</span>
<span>Recent Submissions</span>
</h3>
<div class="space-y-4" id="recent-logs-list">
    <!-- Dynamic Logs -->
</div>
</div>
</div>
</div>
</div>
</div>
</main>
<script src="/js/app.js"></script>
</body>
</html>
