<!doctype html>

<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Manager Dashboard - Internship Manager</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0053dc",
            "primary-dim": "#0049c2",
            "primary-container": "#3e76fe",
            "background": "#f7f9fb",
            "surface": "#ffffff",
            "surface-container": "#eaeff2",
            "surface-container-low": "#f0f4f7",
            "surface-container-highest": "#dce4e8",
            "on-surface": "#2c3437",
            "on-surface-variant": "#596064",
            "outline-variant": "#acb3b7",
            "tertiary-container": "#e6cafa",
            "on-tertiary-container": "#564067",
          },
          fontFamily: {
            headline: ["Manrope", "sans-serif"],
            body: ["Inter", "sans-serif"]
          },
          borderRadius: {
            "3xl": "1.5rem",
            "4xl": "2rem",
          }
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; letter-spacing: -0.02em; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .glass-panel { background: rgba(247, 249, 251, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .ambient-shadow { box-shadow: 0 8px 32px rgba(44, 52, 55, 0.06); }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #eaeff2; border-radius: 10px; }
  </style>
</head>

<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col md:flex-row">
  <!-- TopNavBar (Web & Mobile, hidden on md if SideNav is present, but using as top bar per instruction if needed. Actually, instructed to use SideNav for Web. Let's use SideNavBar for md:flex and TopNavBar for md:hidden) -->
  <!-- SideNavBar -->
  <nav id="side-nav" class="hidden md:flex flex-col fixed left-0 top-0 h-full w-64 bg-[#f0f4f7] p-6 gap-y-8 z-50 pt-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 flex-shrink-0 bg-primary rounded-lg flex items-center justify-center shadow-md">
        <span class="material-symbols-outlined text-white text-lg">domain</span>
      </div>
      <div>
        <p class="font-headline font-extrabold text-blue-700 leading-tight">Internship Portal</p>
        <p class="text-[10px] text-on-surface-variant uppercase tracking-wider font-semibold">Manager Workspace</p>
      </div>
    </div>
    <div class="flex flex-col gap-2">
      <a class="text-blue-600 font-bold flex items-center gap-3 px-4 py-3 bg-white rounded-xl shadow-sm transition-transform" href="manager-dashboard.html">
        <span class="material-symbols-outlined fill text-[20px]" style="font-variation-settings:'FILL' 1">grid_view</span>
        <span class="text-sm">Dashboard</span>
      </a>
      <a class="text-slate-500 flex items-center gap-3 px-4 py-3 hover:translate-x-1 transition-transform" href="manager-attendance.html">
        <span class="material-symbols-outlined text-[20px]">event_available</span>
        <span class="text-sm font-medium">Attendance</span>
      </a>
      <a class="text-slate-500 flex items-center gap-3 px-4 py-3 hover:translate-x-1 transition-transform" href="manager-loge.html">
        <span class="material-symbols-outlined text-[20px]">history_edu</span>
        <span class="text-sm font-medium">Daily Logs</span>
      </a>
    </div>
    <div class="mt-auto space-y-4">
      <button id="logout-btn" class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 w-full transition-colors font-medium">
        <span class="material-symbols-outlined text-[20px]">logout</span>
        <span class="text-sm">Sign Out</span>
      </button>
    </div>
  </nav>
  <!-- Main Content Area -->
  <main class="flex-1 md:ml-64 flex flex-col min-h-screen bg-background">
    <!-- Header Section -->
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-outline-variant/10 shadow-sm flex items-center justify-between px-8 py-3.5">
      <div class="flex items-center gap-4">
        <button class="md:hidden p-2 rounded-lg hover:bg-surface-container" onclick="document.getElementById('side-nav').classList.toggle('hidden')">
          <span class="material-symbols-outlined text-[20px]">menu</span>
        </button>
        <span class="text-base font-black text-on-surface font-headline tracking-tight">Dashboard</span>
        <div class="h-4 w-px bg-outline-variant/20 hidden sm:block"></div>
        <span id="greeting-name" class="text-xs font-bold text-on-surface-variant hidden sm:block">Welcome back</span>
      </div>
      <div class="flex items-center space-x-4">
        <div class="text-right hidden xs:block">
          <div id="user-name" class="text-xs font-black">Loading...</div>
          <div class="text-[9px] text-primary font-black uppercase tracking-[0.15em]">Administrator</div>
        </div>
        <div class="w-9 h-9 rounded-full bg-primary flex items-center justify-center shadow-md text-white group cursor-pointer hover:opacity-90 transition-all">
          <span class="material-symbols-outlined text-[20px]">person</span>
        </div>
      </div>
    </header>
    <!-- Bento Grid Layout -->
    <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
      <!-- Activity Feed Box (Col Span 8) -->
      <div
        class="md:col-span-8 bg-white rounded-3xl p-8 shadow-sm border border-outline-variant/10 relative overflow-hidden flex flex-col">
        <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-primary to-primary-container"></div>

        <div class="flex justify-between items-center mb-8">
          <div>
            <h3 class="font-headline text-xl font-bold text-on-surface mb-1 flex items-center gap-2">
              <span class="material-symbols-outlined text-primary">history</span>
              Activity Stream
            </h3>
            <p class="text-xs text-on-surface-variant font-label">Real-time internship updates</p>
          </div>
          <div class="text-right">
            <div class="flex items-baseline gap-1 justify-end">
              <span id="totalProgramHours" class="text-3xl font-extrabold text-primary font-headline">0.0</span>
              <span class="text-[10px] font-bold text-on-surface-variant uppercase">hrs total</span>
            </div>
          </div>
        </div>

        <div id="activityStreamContainer" class="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
          <!-- Activities will be populated by JavaScript -->
        </div>
      </div>
      <!-- Real-time Status (Col Span 4) -->
      <div class="md:col-span-4 bg-surface-container-low rounded-xl p-6 flex flex-col">
        <h3 class="font-headline text-lg font-bold text-on-surface mb-6 flex items-center justify-between">
          <span>Live Roster</span>
          <span class="flex h-3 w-3 relative">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-primary"></span>
          </span>
        </h3>
        <div class="space-y-4 flex-1" id="rosterContainer">
          <!-- Intern entries will be populated by JavaScript -->
        </div>
      </div>
    </div>
  </main>
  <script src="/js/common.js"></script>
  <script src="/js/manager-dashboard.js"></script>
</body>
</html>
