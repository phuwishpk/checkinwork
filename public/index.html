<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - Architect Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#0053dc",
                        "primary-container": "#3e76fe",
                        "on-primary": "#faf8ff",
                        "background": "#f7f9fb",
                        "surface": "#f7f9fb",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#2c3437",
                        "on-surface-variant": "#596064",
                        "outline": "#747c80",
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; letter-spacing: -0.02em; }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex items-center justify-center p-6">

    <div class="bg-surface-container-lowest p-8 rounded-xl shadow-lg w-full max-w-md border border-outline/20">
        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-on-primary font-bold text-3xl shadow-md">
                <span class="material-symbols-outlined text-4xl">domain</span>
            </div>
        </div>
        <h2 class="text-3xl font-headline font-bold text-center mb-2">Welcome Back</h2>
        <p class="text-center text-on-surface-variant mb-8 text-sm">Please log in to your account</p>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-on-surface mb-1">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 rounded-lg border border-outline focus:ring-2 focus:ring-primary focus:border-primary bg-surface transition-colors">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-on-surface mb-1">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 rounded-lg border border-outline focus:ring-2 focus:ring-primary focus:border-primary bg-surface transition-colors">
            </div>
            
            <div id="login-error" class="text-red-500 text-sm hidden">Invalid username or password</div>

            <button type="submit"
                class="w-full bg-primary text-on-primary py-3 rounded-lg font-semibold shadow-md hover:bg-primary-container transition-colors flex justify-center items-center">
                <span>Sign In</span>
                <span class="material-symbols-outlined ml-2 text-sm">login</span>
            </button>
        </form>

        <div class="mt-6 text-center text-xs text-on-surface-variant border-t border-outline/20 pt-4">
            <p>Demo Credentials:</p>
            <p>Admin: admin / 12345</p>
            <p>Intern: krittinai / 12345</p>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
