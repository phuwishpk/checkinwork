<!doctype html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Manager Attendance - Internship Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0053dc",
            "primary-dim": "#0049c2",
            "primary-container": "#3e76fe",
            "background": "#f7f9fb",
            "surface": "#ffffff",
            "surface-container": "#eaeff2",
            "surface-container-low": "#f0f4f7",
            "surface-container-highest": "#dce4e8",
            "on-surface": "#2c3437",
            "on-surface-variant": "#596064",
            "outline-variant": "#acb3b7",
            "tertiary-container": "#e6cafa",
            "on-tertiary-container": "#564067",
          },
          fontFamily: {
            headline: ["Manrope", "sans-serif"],
            body: ["Inter", "sans-serif"]
          },
          borderRadius: {
            "3xl": "1.5rem",
            "4xl": "2rem",
          }
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; letter-spacing: -0.02em; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .glass-panel { background: rgba(247, 249, 251, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .ambient-shadow { box-shadow: 0 8px 32px rgba(44, 52, 55, 0.06); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); background-color: #e3e9ed; border-left: 1px solid #e3e9ed; border-top: 1px solid #e3e9ed; }
    .calendar-cell { background-color: white; min-height: 140px; padding: 0.5rem; display: flex; flex-direction: column; position: relative; border-right: 1px solid #e3e9ed; border-bottom: 1px solid #e3e9ed; overflow: hidden; }
    .log-bar { height: 20px; margin-bottom: 2px; padding: 0 6px; font-size: 8px; font-weight: 700; display: flex; align-items: center; border-radius: 4px; color: white; white-space: nowrap; overflow: hidden; cursor: pointer; }
  </style>
</head>

<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col md:flex-row">
<!-- SideNavBar -->
<nav id="side-nav" class="hidden md:flex flex-col fixed left-0 top-0 h-full w-64 bg-[#f0f4f7] p-6 gap-y-8 z-50 pt-8">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 flex-shrink-0 bg-primary rounded-lg flex items-center justify-center shadow-md">
      <span class="material-symbols-outlined text-white text-lg">domain</span>
    </div>
    <div>
      <p class="font-headline font-extrabold text-blue-700 leading-tight">Internship Portal</p>
      <p class="text-[10px] text-on-surface-variant uppercase tracking-wider font-semibold">Manager Workspace</p>
    </div>
  </div>
  <div class="flex flex-col gap-2">
    <a class="text-slate-500 flex items-center gap-3 px-4 py-3 hover:translate-x-1 transition-transform" href="manager-dashboard.html">
      <span class="material-symbols-outlined text-[20px]">grid_view</span>
      <span class="text-sm font-medium">Dashboard</span>
    </a>
    <a class="text-blue-600 font-bold flex items-center gap-3 px-4 py-3 bg-white rounded-xl shadow-sm transition-transform" href="manager-attendance.html">
      <span class="material-symbols-outlined fill text-[20px]" style="font-variation-settings:'FILL' 1">event_available</span>
      <span class="text-sm">Attendance</span>
    </a>
    <a class="text-slate-500 flex items-center gap-3 px-4 py-3 hover:translate-x-1 transition-transform" href="manager-loge.html">
      <span class="material-symbols-outlined text-[20px]">history_edu</span>
      <span class="text-sm font-medium">Daily Logs</span>
    </a>
  </div>
  <div class="mt-auto space-y-4">
    <button id="logout-btn" class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 w-full transition-colors font-medium">
      <span class="material-symbols-outlined text-[20px]">logout</span>
      <span class="text-sm">Sign Out</span>
    </button>
  </div>
</nav>

  <!-- Main Content -->
  <main class="flex-1 md:ml-64 flex flex-col min-h-screen bg-background">
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-outline-variant/10 shadow-sm flex items-center justify-between px-8 py-3.5">
      <div class="flex items-center gap-4">
        <button class="md:hidden p-2 rounded-lg hover:bg-surface-container" onclick="document.getElementById('side-nav').classList.toggle('hidden')">
          <span class="material-symbols-outlined text-[20px]">menu</span>
        </button>
        <span class="text-base font-black text-on-surface font-headline tracking-tight">Attendance</span>
        <div class="h-4 w-px bg-outline-variant/20 hidden sm:block"></div>
        <span id="greeting-name" class="text-xs font-bold text-on-surface-variant hidden sm:block">Welcome back</span>
      </div>
      <div class="flex items-center space-x-4">
        <div class="text-right hidden xs:block">
          <div id="user-name" class="text-xs font-black">Admin Manager</div>
          <div class="text-[9px] text-primary font-black uppercase tracking-[0.15em]">Administrator</div>
        </div>
        <div class="w-9 h-9 rounded-full bg-primary flex items-center justify-center shadow-md text-white group cursor-pointer hover:opacity-90 transition-all">
          <span class="material-symbols-outlined text-[20px]">person</span>
        </div>
      </div>
    </header>

    <div class="p-8 max-w-7xl mx-auto w-full space-y-6">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <h3 class="text-2xl font-black font-headline text-on-surface" id="calendar-month-year">Loading...</h3>
        <div class="flex flex-wrap items-center gap-3">
          <select id="view-mode" class="bg-white border border-outline-variant/20 rounded-xl px-4 py-2.5 text-xs font-bold focus:ring-2 focus:ring-primary/40 shadow-sm">
            <option value="all">All Activities</option>
            <option value="tasks">Tasks Only</option>
            <option value="attendance">Attendance Only</option>
          </select>
          <select id="intern-filter" class="bg-white border border-outline-variant/20 rounded-xl px-4 py-2.5 text-xs font-bold focus:ring-2 focus:ring-primary/40 shadow-sm min-w-[180px]">
            <option value="all">All Interns</option>
          </select>
          <div class="flex bg-surface-container rounded-xl p-1 shadow-inner">
            <button id="prev-month" class="p-2 rounded-lg hover:bg-white hover:shadow-sm transition-all"><span class="material-symbols-outlined">chevron_left</span></button>
            <button id="next-month" class="p-2 rounded-lg hover:bg-white hover:shadow-sm transition-all"><span class="material-symbols-outlined">chevron_right</span></button>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-[2rem] shadow-sm border border-outline-variant/10 overflow-hidden ambient-shadow">
        <div class="grid grid-cols-7 bg-surface-container-low text-on-surface-variant font-bold text-[10px] uppercase tracking-[0.2em] py-4 text-center border-b border-outline-variant/5">
          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script src="/js/manager-attendance.js"></script>
</body>
</html>
