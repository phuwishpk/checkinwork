<!doctype html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Manager Attendance - Internship Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-error-container": "#6e0a12",
            "surface-container-highest": "#dce4e8",
            "surface-container-high": "#e3e9ed",
            "error-dim": "#67040d",
            "on-error": "#fff7f6",
            "tertiary-container": "#e6cafa",
            "surface-container-lowest": "#ffffff",
            "secondary-container": "#d3e4fe",
            "tertiary-fixed": "#e6cafa",
            "primary-container": "#3e76fe",
            "surface-tint": "#0053dc",
            surface: "#f7f9fb",
            "on-tertiary-fixed": "#422d53",
            error: "#a83836",
            outline: "#747c80",
            "surface-bright": "#f7f9fb",
            "primary-fixed": "#3e76fe",
            "on-secondary-fixed": "#314055",
            "on-secondary": "#f7f9ff",
            "on-primary-fixed-variant": "#f9f7ff",
            "error-container": "#fa746f",
            "secondary-fixed-dim": "#c5d6f0",
            background: "#f7f9fb",
            "surface-variant": "#dce4e8",
            "secondary-fixed": "#d3e4fe",
            "primary-dim": "#0049c2",
            "on-background": "#2c3437",
            "inverse-surface": "#0b0f10",
            "inverse-primary": "#618bff",
            secondary: "#506076",
            "secondary-dim": "#44546a",
            "on-tertiary-fixed-variant": "#604a71",
            "tertiary-fixed-dim": "#d8bceb",
            "on-surface": "#2c3437",
            "outline-variant": "#acb3b7",
            "inverse-on-surface": "#9a9d9f",
            "on-primary-container": "#000000",
            "surface-container": "#eaeff2",
            "on-secondary-container": "#435368",
            "surface-container-low": "#f0f4f7",
            "primary-fixed-dim": "#2d68f0",
            "on-secondary-fixed-variant": "#4d5d73",
            "tertiary-dim": "#604a72",
            "on-primary": "#faf8ff",
            "on-tertiary-container": "#564067",
            "on-primary-fixed": "#ffffff",
            primary: "#0053dc",
            tertiary: "#6d567f",
            "on-surface-variant": "#596064",
            "surface-dim": "#d4dbdf",
            "on-tertiary": "#fff6fe",
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem",
          },
          fontFamily: {
            headline: ["Manrope", "sans-serif"],
            body: ["Inter", "sans-serif"],
            label: ["Inter", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: "Inter", sans-serif; background-color: #f7f9fb; color: #2c3437; }
    h1, h2, h3, h4, h5, h6, .font-headline { font-family: "Manrope", sans-serif; letter-spacing: -0.02em; }
    .glass-panel { background: rgba(247, 249, 251, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .ambient-shadow { box-shadow: 0 8px 32px rgba(44, 52, 55, 0.06); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); background-color: #e3e9ed; border-left: 1px solid #e3e9ed; border-top: 1px solid #e3e9ed; }
    .calendar-cell { background-color: white; min-height: 140px; padding: 0.5rem; display: flex; flex-direction: column; position: relative; border-right: 1px solid #e3e9ed; border-bottom: 1px solid #e3e9ed; overflow: hidden; }
    .log-bar { height: 20px; margin-bottom: 2px; padding: 0 6px; font-size: 8px; font-weight: 700; display: flex; align-items: center; border-radius: 4px; color: white; white-space: nowrap; overflow: hidden; cursor: pointer; }
  </style>
</head>

<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col md:flex-row relative">
  <!-- SideNavBar -->
  <aside class="hidden md:flex bg-slate-50 dark:bg-slate-950 docked left-0 h-screen w-64 bg-surface-container-low tonal-contrast flat no-shadows fixed left-0 top-0 flex flex-col h-full p-6 space-y-8 overflow-y-auto z-50">
    <div class="flex items-center space-x-3 mb-8">
      <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-on-primary font-bold text-lg shadow-lg shadow-primary/20">
        <span class="material-symbols-outlined">domain</span>
      </div>
      <div>
        <h1 class="text-lg font-black text-slate-900 dark:text-white leading-tight font-headline">Internship Portal</h1>
        <p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest">Manager Workspace</p>
      </div>
    </div>
    <nav class="flex-1 space-y-2">
      <a class="flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 hover:translate-x-1 transition-all duration-300" href="manager-dashboard.html">
        <span class="material-symbols-outlined">grid_view</span>
        <span class="text-sm font-bold">Dashboard</span>
      </a>
      <a class="flex items-center space-x-3 px-4 py-3 rounded-xl text-blue-700 dark:text-blue-300 font-black bg-blue-50 dark:bg-blue-900/20 active:scale-95 transition-all duration-300" href="manager-attendance.html">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">event_available</span>
        <span class="text-sm">Attendance</span>
      </a>
      <a class="flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 hover:translate-x-1 transition-all duration-300" href="manager-loge.html">
        <span class="material-symbols-outlined">history_edu</span>
        <span class="text-sm font-bold">Daily Logs</span>
      </a>
    </nav>
    <div class="mt-auto pt-6 border-t border-outline-variant/10">
      <button id="logout-btn" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 transition-all font-bold group">
        <span class="material-symbols-outlined group-hover:rotate-12 transition-transform">logout</span>
        <span class="text-sm">Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 md:ml-64 flex flex-col min-h-screen relative z-10">
    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 border-b border-outline-variant/10 px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <h2 class="text-xl font-black font-headline text-on-surface tracking-tight">Attendance Calendar</h2>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-right hidden sm:block">
          <div id="user-name" class="text-xs font-black">Admin Manager</div>
          <div class="text-[9px] text-primary font-black uppercase tracking-widest">Administrator</div>
        </div>
        <div class="w-9 h-9 rounded-full bg-primary flex items-center justify-center text-white shadow-md">
          <span class="material-symbols-outlined text-lg">person</span>
        </div>
      </div>
    </header>

    <div class="p-8 max-w-7xl mx-auto w-full space-y-6">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <h3 class="text-2xl font-black font-headline text-on-surface" id="calendar-month-year">Loading...</h3>
        <div class="flex flex-wrap items-center gap-3">
          <select id="view-mode" class="bg-white border border-outline-variant/20 rounded-xl px-4 py-2.5 text-xs font-bold focus:ring-2 focus:ring-primary/40 shadow-sm">
            <option value="all">All Activities</option>
            <option value="tasks">Tasks Only</option>
            <option value="attendance">Attendance Only</option>
          </select>
          <select id="intern-filter" class="bg-white border border-outline-variant/20 rounded-xl px-4 py-2.5 text-xs font-bold focus:ring-2 focus:ring-primary/40 shadow-sm min-w-[180px]">
            <option value="all">All Interns</option>
          </select>
          <div class="flex bg-surface-container rounded-xl p-1 shadow-inner">
            <button id="prev-month" class="p-2 rounded-lg hover:bg-white hover:shadow-sm transition-all"><span class="material-symbols-outlined">chevron_left</span></button>
            <button id="next-month" class="p-2 rounded-lg hover:bg-white hover:shadow-sm transition-all"><span class="material-symbols-outlined">chevron_right</span></button>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-[2rem] shadow-sm border border-outline-variant/10 overflow-hidden ambient-shadow">
        <div class="grid grid-cols-7 bg-surface-container-low text-on-surface-variant font-bold text-[10px] uppercase tracking-[0.2em] py-4 text-center border-b border-outline-variant/5">
          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
      </div>
    </div>
  </main>

  <script src="/js/app.js?v=1.0.3"></script>
</body>

</html>
